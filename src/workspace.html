<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="https://unpkg.com/easymde/dist/easymde.min.css">
    <link rel="stylesheet" href="workspace.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Runa</title>
    <meta name="description" content="Runa webapp–courtesy of Novus Corus">
    <script type="module" src="/workspace.js" defer></script>
    <script src="https://unpkg.com/easymde/dist/easymde.min.js"></script>
  </head>
  <body>
    <main>
        <div id="workspace-panel__left">
            <section id="workspace-panel__left-toolbar">
                <img id="left-toolbar__home" src="assets/svg/home.svg" alt="home">
                <img id="left-toolbar__settings" src="assets/svg/settings.svg" alt="settings">
            </section>
            <section id="workspace-panel__left-explorer">
                <section id="workspace-panel__left-explorer__toolbar">
                    <img id="toolbar_add_note" src="assets/svg/file-plus.svg" alt="add note">
                    <img id="toolbar_del_note" src="assets/svg/file-minus.svg" alt="delete note">
                    <img id="toolbar_add_dir" src="assets/svg/folder-plus.svg" alt="add folder">
                    <img id="toolbar_del_dir" src="assets/svg/folder-minus.svg" alt="delete folder">
                    <img id="toolbar_rename" src="assets/svg/edit.svg" alt="rename">
                </section>
                <nav id="workspace-panel__left-explorer__list">
                    <!-- files & folders -->
                </nav>
            </section>
        </div>
        <div id="workspace-panel__right">
            <section id="workspace-panel__right-toolbar">
                <!-- toolbar for editor -->
            </section>
            <section id="workspace-panel__right-editor">
                <textarea id="right-editor__area"></textarea>
            </section>
        </div>
    </main>
  </body>
</html>
